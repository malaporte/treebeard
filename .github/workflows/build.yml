name: Build

on:
  push:
    branches: [main]
    tags: [v*]

jobs:
  build-mac:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build and package
        run: bun run build
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Treebeard-mac
          path: |
            artifacts/*.dmg
            artifacts/*.tar.zst
            artifacts/*-update.json
          retention-days: 30

      - name: Create GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.tar.zst
            artifacts/*-update.json
